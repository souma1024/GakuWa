name: Build and Push Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-image.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/gakuwa-backend:latest ./apps/backend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gakuwa-backend:latest