name: Build and Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/gakuwa-backend:latest \
            -t ghcr.io/${{ github.repository_owner }}/gakuwa-backend:${IMAGE_TAG} \
            ./apps/backend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gakuwa-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/gakuwa-backend:${IMAGE_TAG}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /GakuWa
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" > .env.deploy
            docker compose --env-file .env.deploy -f docker-compose.prod.yml pull
            docker compose --env-file .env.deploy -f docker-compose.prod.yml up -d