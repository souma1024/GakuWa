upstream backend {
    server backend:3000;
}

server {
    listen 80;

    # 静的ファイルを直接配信
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # APIはbackendへ
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
